## Checklist para el PR

Para agregar esta beca, crea `becas/{nombre-slug}.md` usando `templates/beca-template.md` como guía:

- [ ] Todos los campos del template completados
- [ ] `deadline_status` configurado correctamente (open/closed/estimated/unknown)
- [ ] URL oficial activa y verificada
- [ ] Notas para postulantes latinoamericanos incluidas

